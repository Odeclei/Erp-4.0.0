<!-- Botão para abrir a sidebar -->
<button class="btn btn-dark position-fixed top-0 start-0 m-3 rounded-circle shadow"
        type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#offcanvasSidebar"
        aria-controls="offcanvasSidebar"
        id="sidebarToggle"
        style="z-index: 1051;
               width: 48px;
               height: 48px;
               transition: transform 0.3s ease">
  <i class="bi bi-list fs-2" id="toggleIcon"></i>
</button>
<!-- Sidebar Offcanvas Bootstrap 5.3 -->
<div class="offcanvas offcanvas-start"
     tabindex="-1"
     id="offcanvasSidebar"
     aria-labelledby="offcanvasSidebarLabel"
     style="width: 270px">
  <div class="offcanvas-header bg-dark" id="sidebarHeader">
    <h3 class="offcanvas-title mx-auto" id="offcanvasSidebarLabel">
      <i class="bi bi-grid me-2"></i>Menu
    </h3>
  </div>
  <div class="offcanvas-body px-2 py-3" id="sidebarBody">
    <nav class="nav flex-column">
      <ul class="nav d-flex flex-column">
        <!-- Dashboard OEE -->
        <li class="my-2">
          <a href="{% url 'desempenho:dashboard' %}"
             class="nav-link rounded-pill fw-semibold sidebar-link d-block text-decoration-none fs-4">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard OEE
          </a>
        </li>
        <li class="my-2">
          <a href="#"
             class="nav-link rounded-pill fw-semibold sidebar-link d-block text-decoration-none dropdown-toggle fs-4"
             data-bs-toggle="dropdown"
             aria-expanded="false">
            <i class="bi bi-gear-wide-connected me-2"></i>Cadastros
          </a>
          <ul class="dropdown-menu text-small">
            <li>
              <a class="dropdown-item nav-link fs-3" href="{% url 'rule:index' %}">Cadastros Base</a>
            </li>
            <li>
              <a class="dropdown-item nav-link fs-3" href="{% url 'rule:grupos_list' %}">Grupos</a>
            </li>
            <li>
              <a class="dropdown-item nav-link fs-3" href="{% url 'rule:setores_list' %}">Setores</a>
            </li>
            <li>
              <a class="dropdown-item nav-link fs-3" href="{% url 'rule:postos_list' %}">Postos de Trabalho</a>
            </li>
          </ul>
        </li>
        <hr class="divider my-3" />
        <a class="nav-link px-4 py-3 fs-4 fw-semibold rounded-pill sidebar-link text-danger"
           href="{% url "site_setup:logout" %}">
          <i class="bi bi-box-arrow-right me-2"></i>Sair
        </a>
        <hr />
      </ul>
    </nav>
  </div>
</div>
<script>
    // Alterna entre dark e light na sidebar
    document.addEventListener("DOMContentLoaded", function () {
      const toggle_to_lightmode = document.getElementById("toggle_to_lightmode");
      const toggle_to_darkmode = document.getElementById("toggle_to_darkmode");
      const htmlElement = document.documentElement;
      const sidebarToggle  = document.getElementById("sidebarToggle");
      const toggleIcon = document.getElementById("toggleIcon");
      const sidebar = document.getElementById("offcanvasSidebar");
      const sidebarHeader = document.getElementById("sidebarHeader");
      const sidebarBody = document.getElementById("sidebarBody");
      const saved_theme = localStorage.getItem("theme");

      if (saved_theme){
        htmlElement.setAttribute("data-bs-theme", saved_theme);
      }else{
        const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        htmlElement.setAttribute("data-bs-theme", prefersLight ? "light" : "dark");
      }

      sidebar.addEventListener("show.bs.offcanvas", function () {
        sidebarToggle.classList.add("sidebar-open-btn");
      })
      sidebar.addEventListener("hide.bs.offcanvas", function () {
        sidebarToggle.classList.remove("sidebar-open-btn");
      })

      toggle_to_lightmode.addEventListener("click", function () {
        localStorage.setItem("theme", "light");
        sidebar.classList.remove("bg-body-tertiary");
        sidebar.classList.add("bg-light");
        sidebarHeader.classList.remove("bg-dark", "text-white");
        sidebarHeader.classList.add("bg-light", "text-dark");
        sidebarBody.classList.remove("bg-body-tertiary");
        sidebarBody.classList.add("bg-light", "text-dark");
        sidebarToggle.classList.remove("btn-light");
        sidebarToggle.classList.add("btn-dark");
      });

      toggle_to_darkmode.addEventListener("click", function () {
        localStorage.setItem("theme", "dark");
        sidebar.classList.remove("bg-light");
        sidebar.classList.add("bg-body-tertiary");
        sidebarHeader.classList.remove("bg-light", "text-dark");
        sidebarHeader.classList.add("bg-dark", "text-white");
        sidebarBody.classList.remove("bg-light", "text-dark");
        sidebarBody.classList.add("bg-body-tertiary");
        sidebarToggle.classList.remove("btn-dark");
        sidebarToggle.classList.add("btn-light");
      });
    });

</script>
