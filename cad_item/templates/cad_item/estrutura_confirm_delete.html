<!-- filepath: cad_item/templates/cad_item/estrutura_confirm_delete.html -->
{% extends "global/base.html" %} {% block content %}
<h2 class="mb-4">Confirma a exclusão deste subitem da estrutura?</h2>
<div class="card col-auto p-5">
  <h3>
    <strong>{{ object.subitem.name_subitem }}</strong>
  </h3>
</div>

<div class="my-5"></div>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="col-2 mx-2 p-1 fs-4 btn btn-danger btn-lg">
    Deletar
  </button>
  <a
    href="{% url 'cad_item:estrutura' object.item.pk %}"
    class="col-2 mx-2 p-1 fs-4 btn btn-secondary btn-lg"
  >
    Cancelar
  </a>
</form>
{% endblock %}
