{% extends "global/base.html" %}
{% load static %}

{% block content %}
<section class="search-container">
  <form action="{% url "cad_item:family_search" %}" method="get">
    <div class="group">
      <svg viewBox="0 0 24 24" aria-hidden="true" class="search-icon">
        <g>
          <path
            d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"
          ></path>
        </g>
      </svg>

      <input
        id="query"
        class="search-input"
        type="search"
        placeholder="Buscar ..."
        name="search"
        value="{{ search_value }}"  
      />
    </div>
  </form>
</section>

<section class="family-content">
  <table class="table-itens">
    <caption class="table-caption">
      <h3>Famílias de Produtos Cadastradas</h3>
    </caption>
    <thead>
      <tr class="table-row-header">
        <th class="table-header">Código</th>
        <th class="table-header">Família</th>
      </tr>
    </thead>
    <tbody>
      {% for item in form_family %}
        <tr class="table-row">
          <td class="table-cel table-text-center">{{item.refer}}</td>
          <td class="table-cel table-text-left">
            <a 
              href="{% url "cad_item:family_update" item.pk %}"
            >
            {{item.description}}
            </a>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</section>


{% endblock content %}
