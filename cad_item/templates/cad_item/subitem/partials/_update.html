{% load static %}
<form action="{{ form_action }}"
      method="post"
      enctype="multipart/form-data">
  {% csrf_token %}
  <!-- se houver erros de validação -->
  {% if form.non_fields_errors %}
    <!-- gera novo aviso para cada erro -->
    {% for error in form.non_fields_errors %}<div class="text-danger">{{ error }}</div>{% endfor %}
  {% endif %}
  <!-- gera novo aviso para cada erro -->
  <div class="row g-3 justify-content-center mb-4">
    <div class="col-md-5 position-relative">
      <input type="text"
             name="subitem_cod"
             id="subitem_cod"
             value="{{ form.subitem_cod.value}}"
             class="form-control form-control-lg border border-success pt-3" />
      <label for="subitem_cod"
             class="position-absolute top-0 start-0 translate-middle-y bg-body-tertiary fs-4">
        <strong>Código</strong>
      </label>
    </div>
    <div class="col-md-5 position-relative">
      <input type="text"
             name="name_subitem"
             id="name_subitem"
             value="{{form.name_subitem.value}}"
             class="form-control form-control-lg border border-success pt-3" />
      <label for="name_subitem"
             class="position-absolute top-0 start-0 translate-middle-y bg-body-tertiary fs-4">
        <strong>Subitem</strong>
      </label>
    </div>
  </div>
  <div class="row g-3 justify-content-center mb-4 ">
    <div class="col-md-5 position-relative">
      <input type="text"
             name="variation"
             id="variation"
             value="{{form.variation.value}}"
             class="form-control form-control-lg border border-success pt-3" />
      <label for="variation"
             class="position-absolute top-0 start-0 translate-middle-y bg-body-tertiary fs-4">
        <strong>Variação</strong>
      </label>
    </div>
    <div class="col-md-5 align-content-center">
      <input type="checkbox"
             value=""
             name="is_active"
             id="is_active"
             class="form-check-input border border-success mx-2 pt-3"
             {% if form.instance.is_active %} checked{% endif %}
             style="height: 2rem;
                    width: 2rem" />
      <label for="is_active" class="form-check-label fs-4">
        <strong>Ativo</strong>
      </label>
    </div>
  </div>
  <div class="row col-md-10 pt-3 mx-auto mb-4 position-relative">
    <input class="form-control form-control-lg border border-success pt-3"
           list="datalistMaterialOptions"
           id="material_search"
           name="material"
           value="{% if form.instance.material %} {{form.instance.material.material_description}} {% endif %}"
           placeholder='Buscar Material...'>
    <datalist id="datalistMaterialOptions">
      {% for material in material_list %}
        <option value="{{ material.material_description }}" data-pk="{{ material.pk }}"></option>
      {% endfor %}
    </datalist>
    <label for="material_search"
           class="position-absolute top-0 start-0 translate-middle-y bg-body-tertiary fs-4">
      <strong>Material:</strong>
    </label>
    <input type="hidden" name="material" id="id_material_hidden">
  </div>
  <div class="row g-3 col-md-10 mx-auto mb-4">
    <div class="col position-relative">
      <input type="number"
             name="comprimento"
             id="comprimento"
             value="{{form.comprimento.value}}"
             class="form-control form-control-lg border border-success" />
      <label for="comprimento"
             class="position-absolute top-0 start-0 translate-middle-y bg-body-tertiary fs-4">
        <strong>Comprimento (mm)</strong>
      </label>
    </div>
    <div class="col position-relative">
      <input type="number"
             name="largura"
             id="largura"
             value="{{form.largura.value}}"
             class="form-control form-control-lg border border-success" />
      <label for="largura"
             class="position-absolute top-0 start-0 translate-middle-y bg-body-tertiary fs-4">
        <strong>Largura (mm)</strong>
      </label>
    </div>
    <div class="col position-relative">
      <input type="number"
             name="espessura"
             id="espessura"
             value="{{form.espessura.value}}"
             class="form-control form-control-lg border border-success" />
      <label for="espessura"
             class="position-absolute top-0 start-0 translate-middle-y bg-body-tertiary fs-4">
        <strong>Espessura (mm)</strong>
      </label>
    </div>
  </div>
  <div class="col-md-10 mx-auto position-relative mb-4">
    <input type="file"
           name="ficha_tecnica"
           id="ficha_tecnica"
           class="form-control form-control-lg border border-success pt-3"
           value= "{% if form.ficha_tecnica %} {{form.ficha_tecnica.value}}{% endif %}">
    <label for="ficha_tecnica"
           class="position-absolute top-0 start-0 translate-middle-y bg-body-tertiary fs-4">
      <strong>Ficha Técinca:</strong>
    </label>
    {% if form.ficha_tecnica %}
    <p class="badge bg-info text-bg-secondary fs-5 mt-1"> Atual: </p>
      <small class="form-text text-muted fs-6">{{form.ficha_tecnica.value}}</small>
    {% endif %}
  </div>
  <div class="col-md-10 mx-auto position-relative mb-4">
    <textarea name="observation"
              id="observation"
              value={{form.observation.value}}
              class='form-control form-control-lg border border-success pt-3'></textarea>
    <label for="observation"
           class="position-absolute top-0 start-0 translate-middle-y bg-body-tertiary fs-4">
      <strong>Observações:</strong>
    </label>
  </div>
  <div class="row g-3 col-md-10 justify-content-center my-5">
    <button type="submit" class="btn btn-primary btn-lg col-auto mx-2">Cadastrar Subitem</button>
    <button type="reset" class="btn btn-secondary btn-lg col-auto mx-2">Limpar Campos</button>
  </div>
</form>
